<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Checkout Form Page for Students</title>
</head>
<body>

<a th:href="@{/StudentController/ListOfStudents}">Back</a>
<h1>Book Checkout Form Page for Students</h1>

<table border="1">
    <tr>
        <th>Book id</th>
        <th>Book author</th>
        <th>Book title</th>
        <th>Book quantity</th>
        <th>Action</th>
    </tr>

    <tr th:each="book : ${books}">
        <td th:text="${book.id}"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.title}"></td>
        <td th:text="${book.quantity}"></td>
        <td>
            <a th:href="@{'/borrow/take/' + ${book.id} + '/' + ${studentId}}">
                Take
            </a>
        </td>
    </tr>

</table>

</body>
</html>
