<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Student</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">Edit Student</span>
  </div>
</nav>

<div class="container mt-5 col-md-6">

  <div class="card shadow p-4">

    <h3 class="mb-4 text-center">Edit Student</h3>

    <form th:action="@{'/StudentController/edit/' + ${student.id}}" method="post">

      <div class="mb-3">
        <label class="form-label">First Name</label>
        <input type="text"
               name="first_name"
               class="form-control"
               th:value="${student.first_name}">
      </div>

      <div class="mb-3">
        <label class="form-label">Last Name</label>
        <input type="text"
               name="last_name"
               class="form-control"
               th:value="${student.last_name}">
      </div>

      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="text"
               name="phonenumber"
               class="form-control"
               th:value="${student.phonenumber}">
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success w-100">
          Save
        </button>

        <a th:href="@{/StudentController/ListOfStudents}"
           class="btn btn-secondary w-100">
          Back
        </a>
      </div>

    </form>

  </div>

</div>

</body>
</html>
