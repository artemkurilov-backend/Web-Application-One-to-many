<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Book form</span>
    </div>
</nav>

<div class="container mt-5 col-md-6">

    <div class="card shadow p-4">

        <h3 class="mb-4 text-center">Add Book</h3>

        <form th:action="@{/BookController/formAddBook/new}" method="post">

            <div class="mb-3">
                <label class="form-label">Author</label>
                <input type="text" name="author" class="form-control" placeholder="Enter author">
            </div>

            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-control" placeholder="Enter title">
            </div>

            <div class="mb-3">
                <label class="form-label">Quantity</label>
                <input type="text" name="quantity" class="form-control" placeholder="Enter quantity">
            </div>

            <div class="mb-3">
                <label class="form-label">Content</label>
                <textarea name="content" class="form-control" rows="10"
                          placeholder="Enter book content"
                          th:text="${book.content}"></textarea>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Submit
            </button>

        </form>

    </div>

</div>

</body>
</html>
