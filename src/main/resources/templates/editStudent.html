<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Student</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5 col-md-6">

  <div class="card shadow p-4">

    <h2 class="text-center mb-3">Edit Student</h2>

    <div class="text-center mb-4">
      <a th:href="@{/StudentController/ListOfStudents}"
         class="btn btn-secondary btn-sm">
        Back
      </a>
    </div>

    <form th:action="@{'/StudentController/edit/' + ${student.id}}"
          method="post">

      <div class="mb-3">
        <label class="form-label">First Name</label>
        <input type="text"
               name="FirstName"
               class="form-control"
               th:value="${student.FirstName}">
      </div>

      <div class="mb-3">
        <label class="form-label">Last Name</label>
        <input type="text"
               name="LastName"
               class="form-control"
               th:value="${student.LastName}">
      </div>

      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="text"
               name="Phonenumber"
               class="form-control"
               th:value="${student.Phonenumber}">
      </div>

      <button type="submit"
              class="btn btn-success w-100">
        Save
      </button>

    </form>

  </div>

</div>

</body>
</html>
