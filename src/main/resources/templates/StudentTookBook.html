<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Borrowed Books</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">Borrowed Books</span>
  </div>
</nav>

<div class="container mt-5">

  <h1 class="text-center mb-4">Books Borrowed</h1>

  <!-- Back button -->
  <div class="text-center mb-4">
    <a th:href="@{/StudentController/ListOfStudents}"
       class="btn btn-secondary btn-sm">
      Back
    </a>
  </div>

  <!-- Table -->
  <table class="table table-dark table-striped table-hover text-center">

    <thead>
    <tr>
      <th>ID</th>
      <th>Author</th>
      <th>Title</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="borrow : ${borrows}">
      <td th:text="${borrow.book.id}"></td>
      <td th:text="${borrow.book.author}"></td>
      <td th:text="${borrow.book.title}"></td>
      <td th:text="${borrow.borrowDate}"></td>

      <td>
        <a th:href="@{'/borrow/return/' + ${borrow.id}}"
           class="btn btn-sm btn-warning">
          Return
        </a>
      </td>
    </tr>
    </tbody>

  </table>

</div>

</body>
</html>
