<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Form</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">

  <link rel="apple-touch-icon" sizes="180x180" href="/icons/favicon-180.png">

  <link rel="icon" type="image/png" sizes="192x192" href="/icons/favicon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/favicon-512.png">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">Student form</span>
  </div>
</nav>

<!-- col-md-6 - форма становится узкой и по центру -->
<div class="container mt-5 col-md-6">

  <!-- card shadow p-4 - белый блок с тенью (очень важно для UI) -->
  <div class="card shadow p-4">
    <h3 class="mb-4 text-center">Add Student</h3>

    <form th:action="@{/StudentController/formAddStudent/new}" method="post">

      <!-- mb-3 - отступ между полями -->
      <div class="mb-3">
        <label class="form-label">First name</label>
        <input type="text" name="FirstName" class="form-control" placeholder="Enter first name">
      </div>

      <div class="mb-3">
        <label class="form-label">Last name</label>
        <input type="text" name="LastName" class="form-control" placeholder="Enter last name">
      </div>

      <div class="mb-3">
        <label class="form-label">Phone number</label>
        <input type="text" name="Phonenumber" class="form-control" placeholder="Enter phone">
      </div>

      <!-- w-100 - кнопка на всю ширину -->
      <button type="submit" class="btn btn-success w-100">
        Submit
      </button>

    </form>
  </div>

</div>

</body>
</html>
