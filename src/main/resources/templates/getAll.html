<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List of students</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand mb-0 h1">Manage Students</span>
  </div>
</nav>

<div class="container mt-5">

  <h1 class="text-center mb-4">List of students</h1>

  <!-- Back -->
  <div class="text-center mb-4">
    <a th:href="@{/}"
       class="btn btn-secondary btn-sm">
      Back
    </a>
  </div>

  <!-- Add Student -->
  <div class="text-center mb-4">
    <a th:href="@{/StudentController/formAddStudent}"
       class="btn btn-primary btn-sm">
      Add new student
    </a>
  </div>

  <!-- Table -->
  <table class="table table-dark table-striped table-hover text-center">

    <thead>
    <tr>
      <th>ID</th>
      <th>First name</th>
      <th>Last name</th>
      <th>Phonenumber</th>
      <th>Issue Book</th>
      <th>Books</th>
      <th>Delete</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="student : ${students}">

      <td th:text="${student.id}"></td>
      <td th:text="${student.FirstName}"></td>
      <td th:text="${student.LastName}"></td>
      <td th:text="${student.Phonenumber}"></td>

      <td>
        <a th:href="@{'/StudentController/takeBookForm/' + ${student.id}}"
           class="btn btn-primary btn-sm">
          Issue Book
        </a>
      </td>

      <td>
        <a th:href="@{'/StudentController/TheListOfBooksHeTook/' + ${student.id}}"
           class="btn btn-info btn-sm">
          Books
        </a>
      </td>

      <td>
        <a th:href="@{'/StudentController/delete/' + ${student.id}}"
           class="btn btn-danger btn-sm">
          Delete
        </a>
      </td>

    </tr>

    </tbody>

  </table>

  <!-- PAGINATION -->

  <nav class="mt-4">

    <ul class="pagination justify-content-center">

      <!-- PREVIOUS -->

      <li class="page-item"
          th:classappend="${currentPage == 0} ? 'disabled'">

        <a class="page-link"
           th:href="@{/StudentController/ListOfStudents(page=${currentPage - 1})}">
          Previous
        </a>

      </li>

      <!-- PAGE NUMBERS -->

      <li class="page-item"
          th:each="i : ${#numbers.sequence(0, totalPages == 0 ? 0 : totalPages - 1)}"
          th:classappend="${i == currentPage} ? 'active'">

        <a class="page-link"
           th:href="@{/StudentController/ListOfStudents(page=${i})}"
           th:text="${i + 1}">
        </a>

      </li>

      <!-- NEXT -->

      <li class="page-item"
          th:classappend="${currentPage == totalPages - 1} ? 'disabled'">

        <a class="page-link"
           th:href="@{/StudentController/ListOfStudents(page=${currentPage + 1})}">
          Next
        </a>

      </li>

    </ul>

  </nav>

</div>

</body>
</html>
