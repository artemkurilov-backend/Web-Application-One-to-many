<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Open Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">

    <link rel="apple-touch-icon" sizes="180x180" href="/icons/favicon-180.png">

    <link rel="icon" type="image/png" sizes="192x192" href="/icons/favicon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/favicon-512.png">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Book Details</span>
    </div>
</nav>

<div class="container mt-5 col-md-8">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">Book Information</h2>

        <!-- Buttons -->
        <div class="d-flex justify-content-center gap-3 mb-4">
            <a th:href="@{'/BookController/edit/' + ${book.id}}"
               class="btn btn-warning btn-sm">
                Edit
            </a>

            <a th:href="@{/BookController/ListOfBooks}"
               class="btn btn-secondary btn-sm">
                Back
            </a>
        </div>

        <!-- Info -->
        <p><strong>Author:</strong> <span th:text="${book.author}"></span></p>
        <p><strong>Title:</strong> <span th:text="${book.title}"></span></p>

        <!-- Content -->
        <div class="mt-4">
            <label class="form-label"><strong>Content</strong></label>
            <div class="form-control h-100" style="height: 200px; overflow-y: auto;">
                <span th:text="${book.content}"></span>
            </div>
        </div>

    </div>

</div>

</body>
</html>
