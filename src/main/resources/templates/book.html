<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color:#2c2c2c;
        }

        .book-card{
            background:#f5e6c8;
            border:3px solid #c8a97e;
            border-radius:12px;
            box-shadow:0 0 25px rgba(0,0,0,0.5);
            color:#3b2a1a;
        }

        .book-content{
            background:#fff8e7;
            border:1px solid #c8a97e;
            border-radius:8px;
            padding:15px;
            height:400px;
            overflow-y:auto;
            font-family:Georgia, serif;
            line-height:1.8;
        }

        .book-title{
            font-family:Georgia, serif;
            font-weight:bold;
            color:#5a3e1b;
        }

    </style>

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Book Details</span>
    </div>
</nav>

<div class="container mt-5 col-md-8">

    <div class="card book-card p-4">

        <h2 class="text-center mb-4 book-title">
            Book Information
        </h2>

        <!-- Buttons -->
        <div class="d-flex justify-content-center gap-3 mb-4">

            <a th:href="@{'/BookController/edit/' + ${book.id}}"
               class="btn btn-warning btn-sm">
                Edit
            </a>

            <a th:href="@{/BookController/ListOfBooks}"
               class="btn btn-secondary btn-sm">
                Back
            </a>

        </div>

        <!-- Info -->
        <p>
            <strong>Author:</strong>
            <span th:text="${book.author}"></span>
        </p>

        <p>
            <strong>Title:</strong>
            <span th:text="${book.title}"></span>
        </p>

        <!-- Content -->
        <div class="mt-4">

            <label class="form-label">
                <strong>Content</strong>
            </label>

            <div class="book-content">

                <span th:text="${book.content}"></span>

            </div>

        </div>

    </div>

</div>

</body>
</html>
