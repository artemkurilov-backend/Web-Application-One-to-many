<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>List of books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Manage Books</span>
    </div>
</nav>

<div class="container mt-5">

    <h1 class="text-center mb-4">List of books</h1>

    <!-- Back -->
    <div class="text-center mb-4">
        <a th:href="@{/}" class="btn btn-secondary btn-sm">
            Back
        </a>
    </div>

    <!-- Add book -->
    <div class="text-center mb-4">
        <a th:href="@{/BookController/formAddBook}"
           class="btn btn-primary btn-sm">
            Add new book
        </a>
    </div>

    <!-- Table -->
    <table class="table table-dark table-striped table-hover text-center">

        <thead>
        <tr>
            <th>ID</th>
            <th>Author</th>
            <th>Title</th>
            <th>Quantity</th>
            <th>Action</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.id}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.quantity}"></td>
            <td>
                <a th:href="@{'/BookController/open/' + ${book.id}}"
                   class="btn btn-sm btn-info">
                    Open
                </a>
            </td>
            <td>
                <a th:href="@{'/BookController/delete/' + ${book.id}}"
                   class="btn btn-sm btn-danger">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>

    </table>

</div>

<div th:if="${param.success}" class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">

    <div id="successToast" class="toast align-items-center text-bg-success border-0">
        <div class="d-flex">
            <div class="toast-body">
                Book successfully added
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>


<div th:if="${param.edit}" class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">

    <div id="editToast" class="toast align-items-center text-bg-success border-0">
        <div class="d-flex">
            <div class="toast-body">
                You edited the book
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>


<div th:if="${param.delete}" class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">

    <div id="deleteToastB" class="toast align-items-center text-bg-success border-0">
        <div class="d-flex">
            <div class="toast-body">
                You have deleted the book
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
