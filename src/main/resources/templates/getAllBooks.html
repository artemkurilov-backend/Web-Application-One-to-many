<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Manage Books</span>
    </div>
</nav>

<div class="container mt-5">

    <h1 class="text-center mb-4">List of books</h1>

    <!-- Back -->
    <div class="text-center mb-4">
        <a th:href="@{/}"
           class="btn btn-secondary btn-sm">
            Back
        </a>
    </div>

    <!-- Add Book -->
    <div class="text-center mb-4">
        <a th:href="@{/BookController/formAddBook}"
           class="btn btn-primary btn-sm">
            Add new book
        </a>
    </div>

    <!-- Table -->
    <table class="table table-dark table-striped table-hover text-center">

        <thead>
        <tr>
            <th>ID</th>
            <th>Author</th>
            <th>Title</th>
            <th>Quantity</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="book : ${books}">

            <td th:text="${book.id}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.quantity}"></td>

            <td>

                <a th:href="@{'/BookController/open/' + ${book.id}}"
                   class="btn btn-info btn-sm">
                    Open
                </a>

                <a th:href="@{/BookController/delete/{id}(id=${book.id}, page=${currentPage})}"
                   class="btn btn-danger btn-sm">
                    Delete
                </a>

            </td>

        </tr>

        </tbody>

    </table>

    <!-- pagination -->
    <nav class="mt-4">

        <ul class="pagination justify-content-center">

            <!-- PREVIOUS -->

            <li class="page-item"
                th:classappend="${currentPage == 0} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/BookController/ListOfBooks(page=${currentPage - 1})}">
                    Previous
                </a>

            </li>

            <!-- LEFT WINDOW -->

            <li class="page-item"
                th:each="i : ${#numbers.sequence(currentPage, currentPage + 4)}"
                th:if="${i < totalPages}"
                th:classappend="${i == currentPage} ? 'active'">

                <a class="page-link"
                   th:text="${i + 1}"
                   th:href="@{/BookController/ListOfBooks(page=${i})}">
                </a>

            </li>

            <!-- DOTS -->

            <li class="page-item disabled"
                th:if="${currentPage + 5 < totalPages - 5}">

                <span class="page-link">...</span>

            </li>

            <!-- LAST 5 PAGES ONLY IF NOT OVERLAPPING -->

            <li class="page-item"
                th:if="${currentPage + 5 < totalPages - 5}"
                th:each="i : ${#numbers.sequence(totalPages - 5, totalPages - 1)}">

                <a class="page-link"
                   th:text="${i + 1}"
                   th:href="@{/BookController/ListOfBooks(page=${i})}">
                </a>

            </li>

            <!-- NEXT -->

            <li class="page-item"
                th:classappend="${currentPage == totalPages - 1} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/BookController/ListOfBooks(page=${currentPage + 1})}">
                    Next
                </a>

            </li>

        </ul>

    </nav>

</div>

</body>
</html>
