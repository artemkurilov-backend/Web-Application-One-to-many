<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Manage Books</span>
    </div>
</nav>

<div class="container mt-5">

    <!-- SUCCESS BOOK -->
    <div th:if="${param.successBook}"
         class="toast-container position-fixed top-0 end-0 p-3">

        <div id="successBookToast"
             class="toast show text-bg-success border-0">

            <div class="d-flex">

                <div class="toast-body">
                    Book added successfully.
                </div>

                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>

            </div>

        </div>

    </div>

    <!-- DELETE BOOK -->
    <div th:if="${param.deleteBook}"
         class="toast-container position-fixed top-0 end-0 p-3">

        <div id="deleteToastB"
             class="toast show text-bg-danger border-0">

            <div class="d-flex">

                <div class="toast-body">
                    Book deleted successfully.
                </div>

                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>

            </div>

        </div>

    </div>

    <!-- EDIT BOOK -->
    <div th:if="${param.editBook}"
         class="toast-container position-fixed top-0 end-0 p-3">

        <div id="editToast"
             class="toast show text-bg-success border-0">

            <div class="d-flex">

                <div class="toast-body">
                    Book updated successfully.
                </div>

                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>

            </div>

        </div>

    </div>

    <h1 class="text-center mb-4">List of books</h1>

    <div class="text-center mb-4">
        <a th:href="@{/}" class="btn btn-secondary btn-sm">
            Back
        </a>
    </div>

    <div class="text-center mb-4">
        <a th:href="@{/BookController/formAddBook}"
           class="btn btn-primary btn-sm">
            Add new book
        </a>
    </div>

    <!-- Search + Sort -->
    <div class="d-flex justify-content-end gap-2 mb-3">

        <!-- SEARCH -->
        <form th:action="@{/BookController/search}"
              method="post"
              class="d-flex gap-2">

            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Search book..."
                   style="width: 250px;">

            <select name="searchBy"
                    class="form-select"
                    style="width: 220px;">

                <option value="author">
                    Author
                </option>

                <option value="title">
                    Title
                </option>

                <option value="id">
                    ID
                </option>

            </select>

            <button type="submit"
                    class="btn btn-dark">
                Search
            </button>

        </form>
    </div>

        <!-- SORT -->
        <div class="d-flex justify-content-end gap-2 mb-3">
            <h4 class="m-0">
                Sort:
            </h4>

        <form th:action="@{/BookController/ListOfBooks}"
              method="get">

            <select name="sort"
                    class="form-select"
                    style="width: 180px;"
                    onchange="this.form.submit()">

                <option value="default">
                    Default
                </option>

                <option value="az"
                        th:selected="${sort == 'az'}">
                    A-Z
                </option>

                <option value="za"
                        th:selected="${sort == 'za'}">
                    Z-A
                </option>

                <option value="new"
                        th:selected="${sort == 'new'}">
                    Newest
                </option>

                <option value="old"
                        th:selected="${sort == 'old'}">
                    Oldest
                </option>

            </select>

        </form>
        </div>


    <table class="table table-dark table-striped table-hover text-center">

        <thead>
        <tr>
            <th>ID</th>
            <th>Author</th>
            <th>Title</th>
            <th>Quantity</th>
            <th>Action</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="book : ${books}">

            <td th:text="${book.id}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.quantity}"></td>

            <td>
                <a th:href="@{'/BookController/open/' + ${book.id}}"
                   class="btn btn-info btn-sm">
                    Open
                </a>
            </td>

            <td>
                <a th:href="@{'/BookController/delete/' + ${book.id}}"
                   class="btn btn-danger btn-sm">
                    Delete
                </a>
            </td>

        </tr>

        </tbody>

    </table>

    <!-- Page search -->
    <div class="d-flex justify-content-end mb-3">

        <form th:action="@{/BookController/searchPage}"
              method="post"
              class="d-flex gap-2">

            <input type="text"
                   name="page"
                   class="form-control"
                   placeholder="Page"
                   style="width: 120px;">

            <button type="submit"
                    class="btn btn-dark">
                Go
            </button>

        </form>

    </div>

    <!-- Pagination -->
    <nav class="mt-4" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">

            <!-- PREVIOUS -->
            <li class="page-item"
                th:classappend="${currentPage == 0} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/BookController/ListOfBooks(page=${currentPage - 1}, sort=${sort})}">
                    &lt;
                </a>

            </li>

            <!-- IF TOTAL PAGES <= 10 -->
            <th:block th:if="${totalPages <= 10}">

                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">

                    <a class="page-link"
                       th:text="${i + 1}"
                       th:href="@{/BookController/ListOfBooks(page=${i}, sort=${sort})}">
                    </a>

                </li>

            </th:block>

            <!-- IF TOTAL PAGES > 10 -->
            <th:block th:if="${totalPages > 10}">

                <!-- MOVING WINDOW + DOTS + LAST 5 -->
                <th:block th:if="${currentPage < totalPages - 10}">

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(currentPage, currentPage + 4)}"
                        th:classappend="${i == currentPage} ? 'active'">

                        <a class="page-link"
                           th:text="${i + 1}"
                           th:href="@{/BookController/ListOfBooks(page=${i}, sort=${sort})}">
                        </a>

                    </li>

                    <!-- DOTS -->
                    <li class="page-item disabled">
                        <span class="page-link">...</span>
                    </li>

                    <!-- LAST 5 -->
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(totalPages - 5, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">

                        <a class="page-link"
                           th:text="${i + 1}"
                           th:href="@{/BookController/ListOfBooks(page=${i}, sort=${sort})}">
                        </a>

                    </li>

                </th:block>

                <!-- LAST 10 PAGES WITHOUT DOTS -->
                <th:block th:if="${currentPage >= totalPages - 10}">

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(totalPages - 10, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">

                        <a class="page-link"
                           th:text="${i + 1}"
                           th:href="@{/BookController/ListOfBooks(page=${i}, sort=${sort})}">
                        </a>

                    </li>

                </th:block>

            </th:block>

            <!-- NEXT -->
            <li class="page-item"
                th:classappend="${currentPage == totalPages - 1} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/BookController/ListOfBooks(page=${currentPage + 1}, sort=${sort})}">
                    &gt;
                </a>

            </li>

        </ul>
    </nav>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
